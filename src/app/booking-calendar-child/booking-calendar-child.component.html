
<div class="container child">

  
 <!--    ***{{bookingData | json}}*** -->
  <form 
    [formGroup]="bookingForm" 
    (ngSubmit)="onSubmit()"
    *ngIf="bookingForm">

    <section>
      <mat-form-field appearance="fill" [style.width.px]=327>
        <input matInput placeholder="Your name" [formControl]="bookerName">
      </mat-form-field>
      <mat-form-field appearance="fill" [style.width.px]=327>
        <input matInput placeholder="Your email address" [formControl]="bookerEMail">
        <mat-error *ngIf="bookerEMail.hasError('email') && !bookerEMail.hasError('required')">
          Please enter a valid email address
        </mat-error>
      </mat-form-field>
    </section>

    <section>
      <mat-form-field appearance="fill" [style.width.px]=327>
        <mat-label>Please, select the resource to book</mat-label>
        <mat-select [formControl]="resourceToBook" #theResource (change)='resourceSelected(theResource.value)'>
          <mat-option value="white#room">Sala BLANCA</mat-option>
          <mat-option value="yellow#room">Sala GROGA</mat-option>
          <mat-option value="red#room">Sala VERMELLA</mat-option>
          <mat-option value="blue#room">Sala BLAVA</mat-option>
          <mat-option value="A#pavillion">Pavellón A</mat-option>
          <mat-option value="B#pavillion">Pavellón B</mat-option>
        </mat-select>
      </mat-form-field>
    </section>

        <input matInput [ngxMatDatetimePicker]="picker" placeholder="Choose a date" [formControl]="fromDate"
          [min]="minDate" [max]="maxDate" [disabled]="disabled">
        <ngx-mat-datepicker-toggle matSuffix [for]="picker"></ngx-mat-datepicker-toggle>
        <ngx-mat-datetime-picker #picker [showSpinners]="showSpinners" [showSeconds]="showSeconds"
          [stepHour]="stepHour" [stepMinute]="stepMinute" [stepSecond]="stepSecond" [touchUi]="touchUi"

        </ngx-mat-datetime-picker>
      </mat-form-field>

    <section>
      <mat-form-field appearance="fill" [style.width.px]=327>
        <input matInput [matDatepicker]="pickerFromDate" placeholder="From date" 
                                  [formControl]="fromDate" 
                                  [min]="minDate" 
                                  [matDatepickerFilter]="weekEndFilter">
        <mat-datepicker-toggle matSuffix [for]="pickerFromDate"></mat-datepicker-toggle>
        <mat-datepicker #pickerFromDate [startAt]="minDate"></mat-datepicker>
      </mat-form-field>

      <mat-form-field appearance="fill" [style.width.px]=327>
        <input matInput [matDatepicker]="pickerToDate" placeholder="To date" [formControl]="toDate" 
                                                                              [min]="minDateTo" 
                                                                              [matDatepickerFilter]="weekEndFilter">
        <mat-datepicker-toggle matSuffix [for]="pickerToDate"></mat-datepicker-toggle>
        <mat-datepicker #pickerToDate [startAt]="minDateTo"></mat-datepicker>
      </mat-form-field>
    </section>

    <section class="button-row">
      <button mat-raised-button color="primary" type="submit"  [disabled]="!bookingForm.valid">Send</button>
    </section>
  </form>

    <mwl-utils-calendar-header [(view)]="view" [(viewDate)]="viewDate"></mwl-utils-calendar-header>
    <div [ngSwitch]="view">
      <mwl-calendar-month-view
        *ngSwitchCase="CalendarView.Month"
        [viewDate]="viewDate"
        [events]="events"
        [refresh]="refresh"
        [activeDayIsOpen]="activeDayIsOpen"
        (dayClicked)="dayClicked($event.day)"
        (eventClicked)="handleEvent('Clicked', $event.event)"
        (eventTimesChanged)="eventTimesChanged($event)"
      >
      </mwl-calendar-month-view>

      <mwl-calendar-week-view
        *ngSwitchCase="CalendarView.Week"
        [viewDate]="viewDate"
        [events]="events"
        [refresh]="refresh"
        (eventClicked)="handleEvent('Clicked', $event.event)"
        (eventTimesChanged)="eventTimesChanged($event)"
      >
      </mwl-calendar-week-view>

      <mwl-calendar-day-view
        *ngSwitchCase="CalendarView.Day"
        [viewDate]="viewDate"
        [events]="events"
        [refresh]="refresh"
        (eventClicked)="handleEvent('Clicked', $event.event)"
        (eventTimesChanged)="eventTimesChanged($event)"
      >
      </mwl-calendar-day-view>
    </div>

</div>
